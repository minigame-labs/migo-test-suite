name: Spec Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-specs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate specs
        run: node scripts/validate-specs.mjs
